    <div class="ms-fade-r"></div>
  </div>`;
};

/**
 * renderMonthData(mo, type)
 * Shows entries for the selected month. Uses existing S.incomes / S.expenses data
 * plus recurring projection from FinanceEngine — no new logic.
 */
const renderMonthData=(mo,type,fyStartOverride=null)=>{
  const [yr,mn]=mo.split('-');
  const label=`${MONTHS[Number(mn)-1]} ${yr}`;
  const cur=thisMonth();
  const isFuture=mo>cur;
  const isIncome=type==='income';
  const records=isIncome?S.incomes.filter(i=>i.month===mo):S.expenses.filter(e=>e.month===mo);
  const accentColor=isIncome?'var(--green)':'var(--red)';

  // For future months with no records, show projected recurring
  if(records.length===0&&isFuture){
    const fyStart=fyStartOverride||(isIncome?_incFy||currentFY():_expFy||currentFY());
    const breakdown=FinanceEngine.getMonthlyBreakdown(isIncome?S.incomes:S.expenses,fyStart);
    const row=breakdown.find(r=>r.mo===mo);
    if(row&&row.value>0){
      const recurItems=isIncome
        ?S.incomes.filter(i=>i.isRecurring)
        :S.expenses.filter(e=>e.isRecurring);
      // Show latest recurring entries as projection
      const seen=new Set();
      const projRows=recurItems.filter(r=>{
        const key=isIncome?r.source:r.category;
        if(seen.has(key))return false;seen.add(key);return true;
      });
      if(projRows.length>0)return`
        <div style="padding:.35rem 0 .5rem;display:flex;align-items:center;gap:.4rem;margin-bottom:.25rem">
          <span style="font-size:.68rem;font-weight:700;color:var(--amber);background:var(--amber-light);padding:.1rem .45rem;border-radius:4px">PROJECTED</span>
          <span style="font-size:.7rem;color:var(--text-4)">${label} · recurring estimate</span>
        </div>
        ${projRows.map(r=>`<div class="md-row">
          <div><div class="md-name">${isIncome?r.source:r.category}</div>
          <div class="md-sub">${isIncome?r.type:r.category}${r.isRecurring?' · 🔄 recurring':''}</div></div>
          <div class="md-amt" style="color:var(--amber)">${fmt(r.amount)}</div>
        </div>`).join('')}`;
    }
    return`<div class="md-empty">No projected data for ${label}</div>`;
  }

  if(records.length===0)return`<div class="md-empty">No entries for ${label}</div>`;

  const total=records.reduce((s,r)=>s+Number(r.amount),0);
  const emiMo=isIncome?0:emiForMonthAll(mo);
  return`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.625rem;padding-bottom:.5rem;border-bottom:2px solid var(--border)">
      <div>
        <div style="font-size:.72rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em">${label}</div>
        <div style="font-size:1.05rem;font-weight:800;color:${accentColor};margin-top:.15rem">${fmt(total+(isIncome?0:emiMo))}</div>
      </div>
      <button onclick="D('MODAL',${isIncome?`'quick_income'`:`'quick_expense'`})" style="font-size:.7rem;font-weight:700;padding:.3rem .65rem;background:${isIncome?'var(--green-light)':'var(--red-light)'};border:1px solid ${isIncome?'#bbf7d0':'#fecaca'};border-radius:6px;color:${isIncome?'var(--green)':'var(--red)'};cursor:pointer;font-family:var(--font)">+ Add</button>
    </div>
    ${records.map(r=>`<div class="md-row" style="align-items:center">
      <div style="flex:1;min-width:0">
        <div class="md-name">${isIncome?r.source:r.category}</div>
        <div class="md-sub">${isIncome?r.type:''}${r.date?' · '+r.date:''}${r.isRecurring?' · 🔄':''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem;flex-shrink:0">
        <div class="md-amt" style="color:${accentColor}">${fmt(r.amount)}</div>
        <div style="display:flex;gap:.25rem">
          <button class="btn-sm btn-edit" onclick="D('CLOSE_MODAL');${isIncome?`_iEdit='${r.id}';_tab='income'`:`_eEdit='${r.id}';_tab='expenses'`};render()" style="font-size:.58rem;padding:.2rem .4rem">edit</button>
          <button class="btn-sm btn-del" onclick="${isIncome?`D('DEL_INCOME','${r.id}')`:`D('DEL_EXP','${r.id}')`}" style="font-size:.58rem;padding:.2rem .4rem">del</button>
        </div>
      </div>
    </div>`).join('')}
    ${emiMo>0?`<div class="md-row">
      <div><div class="md-name">💳 EMI</div><div class="md-sub">Loan payments</div></div>
      <div class="md-amt" style="color:var(--red)">${fmt(emiMo)}</div>
    </div>`:''}`;
};

/**
 * woFyPanelRender(type) — re-renders just the FY panel in-place without full render().
 * Called on month pill click and tab switch.
 */
const woFyPanelRender=(type,ctx='tab')=>{
  const isIncome=type==='income';
  const isModal=ctx==='modal';
  // FY source: modal uses _dashFy, tab uses _incFy/_expFy
  const fyStart=isModal
    ?(_dashFy||currentFY())
    :(isIncome?(_incFy||currentFY()):(_expFy||currentFY()));
  // State: modal has own sel/view, tab has its own
  let selMo, view;
  if(isModal){
    selMo=isIncome?_selIncMoModal:_selExpMoModal;
    view=isIncome?_fyIncViewModal:_fyExpViewModal;
  } else {
    selMo=isIncome?_selIncMo:_selExpMo;
    view=isIncome?_fyIncView:_fyExpView;
  }
  const suffix=isModal?'-modal':'';
  const accentColor=isIncome?'var(--green)':'var(--red)';

  // Re-render month selector pills
  const track=document.getElementById(`ms-track-${type}${suffix}`);
  if(track){
    const breakdown=FinanceEngine.getMonthlyBreakdown(isIncome?S.incomes:S.expenses,fyStart);
    track.innerHTML=breakdown.map(row=>{
      const isActive=row.mo===selMo;
      const valColor=row.isProjected?'var(--amber)':row.value>0?accentColor:'var(--text-4)';
      const [,mn]=row.mo.split('-');
      return`<div class="ms-pill${isActive?' ms-active':''}" data-mo="${row.mo}"
        onclick="${isModal
          ?`_sel${isIncome?'Inc':'Exp'}MoModal='${row.mo}';woFyPanelRender('${type}','modal')`
          :`_sel${isIncome?'Inc':'Exp'}Mo='${row.mo}';woFyPanelRender('${type}')`}">
        <div class="ms-pill-mo">${MONTHS[Number(mn)-1]}</div>
        <div class="ms-pill-val" style="color:${isActive?valColor:'var(--text-4)'}">
          ${row.value>0?'₹'+(row.value>=1e5?(row.value/1e5).toFixed(1)+'L':row.value>=1e3?Math.round(row.value/1e3)+'K':row.value):'—'}
        </div>
      </div>`;
    }).join('');
    woScrollToActivePill(type,suffix);
  }

  // Re-render panel body
  const body=document.getElementById(`fy-panel-body-${type}${suffix}`);
  if(body){
    body.innerHTML=view==='detail'
      ?renderMonthData(selMo,type,fyStart)
      :renderFYSummary(type,fyStart);
  }

  // Update tab active states
  ['detail','summary'].forEach(v=>{
    const t=document.getElementById(`fpt-${type}${suffix}-${v}`);
    if(t)t.className='fy-panel-tab'+(view===v?' fpt-active':'');
  });
};

/** Smooth-scroll the pill track so the active pill is centred */
const woScrollToActivePill=(type,suffix='')=>{
  requestAnimationFrame(()=>{
    const track=document.getElementById(`ms-track-${type}${suffix}`);
    if(!track)return;
    const active=track.querySelector('.ms-active');
    if(!active)return;
    const tw=track.offsetWidth;
    const left=active.offsetLeft-tw/2+active.offsetWidth/2;
    track.scrollTo({left,behavior:'smooth'});
  });
};

/** Called after render() to wire up scroll-snap detection */
const woInitMonthSelector=(type,ctx='tab')=>{
  const suffix=ctx==='modal'?'-modal':'';
  const track=document.getElementById(`ms-track-${type}${suffix}`);
  if(!track)return;
  woScrollToActivePill(type,suffix);
  let scrollTimer;
  track.addEventListener('scroll',()=>{
    clearTimeout(scrollTimer);
    scrollTimer=setTimeout(()=>{
      const tw=track.offsetWidth;
      const cx=track.scrollLeft+tw/2;
      let closest=null,minDist=Infinity;
      track.querySelectorAll('.ms-pill').forEach(p=>{
        const pc=p.offsetLeft+p.offsetWidth/2;
        const d=Math.abs(pc-cx);
        if(d<minDist){minDist=d;closest=p;}
      });
      if(closest){
        const mo=closest.dataset.mo;
        const isModal=ctx==='modal';
        const cur=isModal
          ?(type==='income'?_selIncMoModal:_selExpMoModal)
          :(type==='income'?_selIncMo:_selExpMo);
        if(mo!==cur){
          if(isModal){if(type==='income')_selIncMoModal=mo;else _selExpMoModal=mo;}
          else{if(type==='income')_selIncMo=mo;else _selExpMo=mo;}
          woFyPanelRender(type,ctx);
        }
      }
    },120);
  },{passive:true});
};

      const orig=S.incomes.find(i=>i.id===_iEdit);
      const updated={id:_iEdit,source:src,amount:amt,type,month,isFixed,isRecurring,notes};
      // If recurring, always ask about future records (regardless of whether future records exist)
      if(orig&&orig.isRecurring){

const INV_TYPES=['Stocks','Mutual Funds','Crypto','Gold','Real Estate','Retirement Fund','Fixed Deposit','PPF','NSC','Bonds','Other'];
const FIXED_RATE_TYPES=['Fixed Deposit','PPF','NSC','Bonds'];
let _invEdit=null,_invTab='investments',_sipEdit=null,_invFy=null;

const invTabFYs=()=>allDataFYs();

// sipMonthsElapsed() — delegated to FinanceEngine.getSIPMonthsElapsed (aliased in FinanceEngine block)
const sipCurrentValue=f=>{
  // Use manually entered current value if provided, else use amount invested (months × sipAmount)
  return Number(f.currentValue||0)||Number(f.sipAmount)*sipMonthsElapsed(f);
};

// Compound monthly return for fixed-rate investments (FD, PPF, etc.)
// P × (1 + r/12)^n  where r = annual rate, n = months elapsed
const fixedRateCurrentValue=(inv)=>{
  if(!inv.interestRate||Number(inv.interestRate)===0) return Number(inv.currentValue||inv.invested);
  const P=Number(inv.invested);
  const r=Number(inv.interestRate)/100;
  const rM=r/12;
  let n=0;
  if(inv.startDate){
    const start=new Date(inv.startDate);
    const now=new Date();
    n=Math.max(0,(now.getFullYear()-start.getFullYear())*12+(now.getMonth()-start.getMonth()));
  }
  return Math.round(P*Math.pow(1+rM,n));
};

const getInvCurrentValue=(inv)=>{
  if(FIXED_RATE_TYPES.includes(inv.type)&&inv.interestRate&&Number(inv.interestRate)>0){
    return fixedRateCurrentValue(inv);
  }
  return Number(inv.currentValue||inv.invested);
};

const invTab=()=>{
  const now=new Date();
  const curFy=currentFY();
  const iInvFYs=invTabFYs();
  if(_invFy===null||!iInvFYs.includes(_invFy))_invFy=curFy;
  const fyStart=_invFy;
  const fyMonths=fyMonthList(fyStart);
  const m=thisMonth();

  const tInv=S.investments.reduce((s,i)=>s+Number(i.invested),0)+S.openingInvestments;
  const tCur=S.investments.reduce((s,i)=>s+Number(i.currentValue||i.invested),0)+S.openingInvestments;
  const tRet=tCur-tInv,retPct=tInv>0?pct(tCur,tInv):0;

  // SIP totals
  const sipTotalInvested=S.sipFunds.reduce((s,f)=>s+Number(f.sipAmount)*sipMonthsElapsed(f),0);
  const sipTotalCurrent=S.sipFunds.reduce((s,f)=>s+sipCurrentValue(f),0);

const bindInvestments=()=>{
  // Show/hide interest rate field based on asset type
  const typeEl=document.getElementById('inv-type');
  const rateWrap=document.getElementById('inv-rate-wrap');
  const ratePreview=document.getElementById('inv-rate-preview');
  const updateRateVisibility=()=>{
    if(!typeEl||!rateWrap) return;
    const isFixed=FIXED_RATE_TYPES.includes(typeEl.value);
    rateWrap.style.display=isFixed?'block':'none';
  };
  const updateRatePreview=()=>{
    if(!ratePreview||!rateWrap) return;
    const P=Number(document.getElementById('inv-inv')?.value)||0;
    const r=Number(document.getElementById('inv-rate')?.value)||0;
    const startDate=document.getElementById('inv-date')?.value;
    if(P>0&&r>0&&startDate){
      const rM=r/100/12;
      const start=new Date(startDate);const now=new Date();
      const n=Math.max(0,(now.getFullYear()-start.getFullYear())*12+(now.getMonth()-start.getMonth()));
      const fv=Math.round(P*Math.pow(1+rM,n));
      const yr1=Math.round(P*Math.pow(1+rM,12));
      const yr5=Math.round(P*Math.pow(1+rM,60));
      ratePreview.style.display='block';
      ratePreview.textContent=`Current value (auto): ₹${new Intl.NumberFormat('en-IN').format(fv)} after ${n} months · 1yr: ₹${new Intl.NumberFormat('en-IN').format(yr1)} · 5yr: ₹${new Intl.NumberFormat('en-IN').format(yr5)}`;
    } else { ratePreview.style.display='none'; }

  typeEl?.addEventListener('change',updateRateVisibility);
  document.getElementById('inv-rate')?.addEventListener('input',updateRatePreview);
  document.getElementById('inv-inv')?.addEventListener('input',updateRatePreview);
  document.getElementById('inv-date')?.addEventListener('change',updateRatePreview);

    const isSIP=document.getElementById('inv-mode-sip')?.checked;
    const name=document.getElementById('inv-name').value.trim();

      const currentValue=Number(document.getElementById('sip-curval').value)||0;
      if(!sipAmount){pushNotif('Please enter SIP amount','red');return}
      const entry={id:_sipEdit||genId(),name,fundType:type,sipAmount,startDate,currentValue,isin,notes};
      if(_sipEdit){
        const orig=S.sipFunds.find(f=>f.id===_sipEdit);

          if(!confirm(`SIP amount changed from ${fmt(orig.sipAmount)} to ${fmt(sipAmount)}/mo. Apply new amount going forward from today?`)){

        D('UPD_SIP',entry);_sipEdit=null;pushNotif('SIP updated');

    } else {
      const invested=Number(document.getElementById('inv-inv').value);
      const interestRate=Number(document.getElementById('inv-rate')?.value)||0;

window.woBoundDate=(monthFieldId,dateFieldId)=>{

const DED_TYPES=['Section 80C (PPF / ELSS / LIC)','Section 80D (Health Insurance — Self)','Section 80D (Health Insurance — Parents)','HRA Exemption','Home Loan Interest (Sec 24b)','NPS (Section 80CCD(1B))','Education Loan Interest (Sec 80E)','Donations (Sec 80G)','Other'];

const calcTax=(income,regime,deds)=>{
  if(regime==='new'){
    const taxable=Math.max(0,income-75000);
    let tax=0,rem=taxable;
    for(const[size,rate] of [[400000,0],[400000,.05],[400000,.10],[400000,.15],[400000,.20],[400000,.25],[Infinity,.30]]){
      if(rem<=0)break;const chunk=size===Infinity?rem:Math.min(rem,size);tax+=chunk*rate;rem-=chunk;
    }
    if(taxable<=1200000)tax=0;
    return Math.round(tax*1.04);
  }
  const taxable=Math.max(0,income-50000-deds);
  let tax=0,rem=taxable;
  for(const[size,rate] of [[250000,0],[250000,.05],[500000,.20],[Infinity,.30]]){
    if(rem<=0)break;const chunk=size===Infinity?rem:Math.min(rem,size);tax+=chunk*rate;rem-=chunk;
  }
  if(taxable<=500000)tax=0;
  return Math.round(tax*1.04);
};

const getTaxSavingTips=(yInc,tDed,regime)=>{
  const tips=[];
  const used80C=S.taxDeductions.filter(d=>d.type.includes('80C')).reduce((s,d)=>s+Number(d.amount),0);
  const used80D_self=S.taxDeductions.filter(d=>d.type.includes('80D')&&d.type.includes('Self')).reduce((s,d)=>s+Number(d.amount),0);
  const used80D_par=S.taxDeductions.filter(d=>d.type.includes('80D')&&d.type.includes('Parent')).reduce((s,d)=>s+Number(d.amount),0);
  const usedNPS=S.taxDeductions.filter(d=>d.type.includes('80CCD')).reduce((s,d)=>s+Number(d.amount),0);
  const usedHRA=S.taxDeductions.filter(d=>d.type.includes('HRA')).reduce((s,d)=>s+Number(d.amount),0);
  const used80G=S.taxDeductions.filter(d=>d.type.includes('80G')).reduce((s,d)=>s+Number(d.amount),0);

  if(regime==='old'){
    if(used80C<150000)tips.push({icon:'🛡️',section:'Section 80C',tip:'Invest up to ₹1,50,000 in PPF, ELSS, LIC, NSC, 5-yr FD, or Sukanya Samriddhi to get full deduction.',remaining:150000-used80C,saving:Math.round((150000-used80C)*0.3)});
    if(used80D_self<25000)tips.push({icon:'🏥',section:'Section 80D — Health Insurance (Self & Family)',tip:'Health insurance premium for self, spouse, children (below 60 yrs) — deductible up to ₹25,000/yr. Preventive health check-up included (up to ₹5,000 within this limit).',remaining:25000-used80D_self,saving:Math.round((25000-used80D_self)*0.3)});
    if(used80D_par<25000)tips.push({icon:'👴',section:'Section 80D — Health Insurance (Parents < 60)',tip:'Separate health insurance for parents (below 60 yrs) — up to ₹25,000 additional deduction.',remaining:25000-used80D_par,saving:Math.round((25000-used80D_par)*0.3)});
    if(usedNPS<50000)tips.push({icon:'🏦',section:'Section 80CCD(1B) — NPS',tip:'Contribute to National Pension Scheme (NPS) for an additional deduction of up to ₹50,000 over and above the ₹1.5L 80C limit.',remaining:50000-usedNPS,saving:Math.round((50000-usedNPS)*0.3)});
    if(!usedHRA&&yInc>600000)tips.push({icon:'🏠',section:'HRA Exemption',tip:'If you pay rent and receive HRA from employer, claim HRA exemption. Keep rent receipts. Minimum of: actual HRA, rent paid − 10% salary, or 40–50% of basic salary.',remaining:null,saving:null});
    if(!used80G)tips.push({icon:'💝',section:'Section 80G — Donations',tip:'Donations to approved charities, PM Relief Fund, etc. are deductible. 50–100% of donation depending on the organisation.',remaining:null,saving:null});
  } else {
    tips.push({icon:'💡',section:'New Regime Note',tip:'The New Regime does not allow most deductions (80C, 80D, HRA etc.). Consider switching to Old Regime if your total deductions exceed ₹1.5L. Standard deduction of ₹75,000 is auto-applied.',remaining:null,saving:null});
    if(yInc<=1200000)tips.push({icon:'🎁',section:'87A Rebate Benefit',tip:'Your income is within ₹12,00,000 — you qualify for full 87A rebate under New Regime, making your tax liability NIL.',remaining:null,saving:null});
  }
  return tips;
};

let _taxRegime='new',_taxFy=null;

const taxTab=()=>{
  const now=new Date(),cm=now.getMonth()+1;
  const curFyStart=cm>=4?now.getFullYear():now.getFullYear()-1;
  if(_taxFy===null)_taxFy=curFyStart;

  // Build list of FYs with income data + current + next if recurring
  const taxFYs=(()=>{
    const set=new Set([curFyStart]);
    S.incomes.forEach(i=>{if(!i.month)return;const[y,mo]=i.month.split('-').map(Number);set.add(mo>=4?y:y-1)});
    const hasRecurring=S.incomes.some(i=>i.isRecurring);
    if(hasRecurring)set.add(curFyStart+1);
    return [...set].sort((a,b)=>b-a);
  })();
  if(!taxFYs.includes(_taxFy))_taxFy=curFyStart;

  const fyStart=_taxFy,fyEnd=fyStart+1;
  const fyMonths=[];
  for(let m=4;m<=12;m++)fyMonths.push(fyStart+'-'+String(m).padStart(2,'0'));
  for(let m=1;m<=3;m++)fyMonths.push(fyEnd+'-'+String(m).padStart(2,'0'));

  const isNextFY=fyStart>curFyStart;
  let yInc=0;
  if(isNextFY){
    // Project from recurring income
    const latest={};S.incomes.filter(i=>i.isRecurring).forEach(i=>{if(!latest[i.source]||i.month>latest[i.source].month)latest[i.source]=i});
    yInc=Object.values(latest).reduce((s,i)=>s+Number(i.amount),0)*12;
  } else {
    yInc=S.incomes.filter(i=>fyMonths.includes(i.month)).reduce((s,i)=>s+Number(i.amount),0);
  }

  const tDed=S.taxDeductions.reduce((s,d)=>s+Number(d.amount),0);
  const tn=calcTax(yInc,'new',tDed),to=calcTax(yInc,'old',tDed);
  const better=tn<=to?'New Regime':'Old Regime',saving=Math.abs(tn-to);
  const newTaxable=Math.max(0,yInc-75000),oldTaxable=Math.max(0,yInc-50000-tDed);
  const newRebate=newTaxable<=1200000,oldRebate=oldTaxable<=500000;
  const capS=S.investments.filter(i=>{const d=new Date(i.startDate);return(now-d)/31536e6<1}).reduce((s,i)=>s+Math.max(0,Number(i.currentValue||i.invested)-Number(i.invested)),0);
  const capL=S.investments.filter(i=>{const d=new Date(i.startDate);return(now-d)/31536e6>=1}).reduce((s,i)=>s+Math.max(0,Number(i.currentValue||i.invested)-Number(i.invested)),0);
  const yr=fyStart+'-'+String(fyEnd).slice(-2);
  return`
  <div class="section-head"><div class="section-title">Tax Estimation</div><div class="section-sub">AY ${fyEnd}–${fyEnd+1}</div></div>

const bindCalc=()=>{
  document.getElementById('c-run')?.addEventListener('click',()=>{
    const P=_calcMode!=='sip'?Number(document.getElementById('c-p')?.value)||0:0;
    const sipAmt=_calcMode!=='lumpsum'?Number(document.getElementById('c-sip')?.value)||0:0;
    const rAnnual=Number(document.getElementById('c-r').value)||12;
    const t=Math.max(1,Number(document.getElementById('c-t').value)||10);
    const stepUp=_calcMode==='sip'?Number(document.getElementById('c-step')?.value)||0:0;
    const rM=rAnnual/100/12; // monthly rate

    // ── Lump Sum FV (compound monthly) ──
    const lumpFV=P>0?Math.round(P*Math.pow(1+rM,t*12)):0;

    // ── SIP FV with optional step-up ──
    let sipFV=0,sipTotal=0;
    if(sipAmt>0){
      if(stepUp>0){
        // Step-up SIP: SIP increases by stepUp% each year
        let sip=sipAmt;
        for(let yr=0;yr<t;yr++){
          for(let mo=0;mo<12;mo++){
            const monthsLeft=t*12-(yr*12+mo);
            sipFV+=Math.round(sip*Math.pow(1+rM,monthsLeft));
            sipTotal+=sip;
          }
          sip=Math.round(sip*(1+stepUp/100));
        }
        sipFV=Math.round(sipFV);
      }else{
        // Standard SIP FV = SIP * [(1+r)^n - 1]/r * (1+r)
        const n=t*12;
        sipFV=rM>0?Math.round(sipAmt*(Math.pow(1+rM,n)-1)/rM*(1+rM)):sipAmt*n;
        sipTotal=sipAmt*n;
      }
    }

    const fv=lumpFV+sipFV;
    const ti=P+Math.round(sipTotal);
    const profit=fv-ti;
    const cagr=ti>0&&t>0?fmtN((Math.pow(fv/ti,1/t)-1)*100,2):0;
    const wealthMultiple=ti>0?fmtN(fv/ti,2):0;

    // Year-by-year chart data
    const chart=Array.from({length:t},(_,i)=>{
      const yr=i+1,n=yr*12;
      let lv=P>0?Math.round(P*Math.pow(1+rM,n)):0;
      let sv=0,stot=0;
      if(sipAmt>0&&stepUp>0){
        let s=sipAmt;
        for(let y=0;y<yr;y++){
          for(let mo=0;mo<12;mo++){
            const ml=(yr-y)*12-mo;
            sv+=s*Math.pow(1+rM,ml);stot+=s;
          }
          s=Math.round(s*(1+stepUp/100));
        }
        sv=Math.round(sv);
      }else if(sipAmt>0){
        sv=rM>0?Math.round(sipAmt*(Math.pow(1+rM,n)-1)/rM*(1+rM)):sipAmt*n;
        stot=sipAmt*n;
      }
      const invested=P+Math.round(stot);
      return{y:'Y'+yr,Total:lv+sv,Invested:invested};
    });

    // Milestones
    const milestones=[
      {label:'After 1 year',val:fmt(chart[0]?.Total||0)},
      {label:`After ${Math.floor(t/2)} years`,val:fmt(chart[Math.floor(t/2)-1]?.Total||0)},
      {label:`After ${t} years`,val:fmt(fv)},
      {label:'Total invested',val:fmt(ti)},
      {label:'Wealth gained',val:fmt(profit)},
      {label:'CAGR',val:`${cagr}%`},
    ].filter(m=>!isNaN(parseFloat(m.val.replace(/[^0-9.-]/g,''))));

    _calcRes={fv,ti,profit,cagr,wealthMultiple,lump:P,lumpFV:lumpFV||0,sipFV:sipFV||0,sipTotal:Math.round(sipTotal),rate:rAnnual,years:t,chart,milestones};
    render();
    setTimeout(()=>{
      const el=document.getElementById('ch-calc');
      if(el){
        _charts.calc=new Chart(el,{type:'line',data:{labels:_calcRes.chart.map(x=>x.y),datasets:[
          {label:'Amount Invested',data:_calcRes.chart.map(x=>x.Invested),borderColor:'#94a3b8',borderDash:[5,4],borderWidth:1.5,fill:false,pointRadius:0,tension:.3},
          {label:'Portfolio Value',data:_calcRes.chart.map(x=>x.Total),borderColor:'#0d9488',backgroundColor:'rgba(13,148,136,.1)',fill:true,tension:.4,borderWidth:2.5,pointRadius:0},
        ]},options:cOpts()});
      }
    },30);
  });
};

const bindScenario=()=>{
  document.getElementById('sc-run')?.addEventListener('click',()=>{
    const mInv=S.investments.reduce((s,i)=>s+Number(i.monthlyContrib||0),0)+S.sipFunds.reduce((s,f)=>s+Number(f.sipAmount),0);
    const port=S.investments.reduce((s,i)=>s+Number(i.currentValue||i.invested),0)+S.openingInvestments+S.sipFunds.reduce((s,f)=>s+sipCurrentValue(f),0);
    if(_scenario==='job_loss'){
      const exp=Number(document.getElementById('sc-exp').value)||1,sav=Number(document.getElementById('sc-sav').value)||0;
      _scenRes={type:'job_loss',months:fmtN(sav/exp,1)};
    }else if(_scenario==='sip_increase'){
      _sipInc=Number(document.getElementById('sc-sinc').value)||20;
      const curSIP=mInv||5000,newSIP=curSIP*(1+_sipInc/100),r=.12/12,t=10*12;
      const fv=s=>Math.round(s*((Math.pow(1+r,t)-1)/r)*(1+r));
      const chart=Array.from({length:10},(_,i)=>{const tt=(i+1)*12;return{y:`Y${i+1}`,Current:Math.round(curSIP*((Math.pow(1+r,tt)-1)/r)*(1+r)),New:Math.round(newSIP*((Math.pow(1+r,tt)-1)/r)*(1+r))}});
      _scenRes={type:'sip_increase',curSIP,newSIP,curFV:fv(curSIP),newFV:fv(newSIP),diff:fv(newSIP)-fv(curSIP),chart};
    }else{
      _retAge=Number(document.getElementById('sc-rage').value)||60;
      _retExp=Number(document.getElementById('sc-rexp').value)||50000;
      const yrs=Math.max(1,_retAge-30),inflExp=Math.round(_retExp*Math.pow(1.06,yrs)),need=inflExp*12*25,r=.12/12,t=yrs*12,proj=Math.round(port*Math.pow(1+r,t)+mInv*((Math.pow(1+r,t)-1)/r)*(1+r));
      _scenRes={type:'retirement',yrs,inflExp,need,proj,gap:proj-need};
    }
    render();
    setTimeout(()=>{
      const el=document.getElementById('ch-scen');
      if(el&&_scenRes?.chart)_charts.scen=new Chart(el,{type:'line',data:{labels:_scenRes.chart.map(x=>x.y),datasets:[{label:'Current SIP',data:_scenRes.chart.map(x=>x.Current),borderColor:'#d97706',backgroundColor:'rgba(217,119,6,.08)',fill:true,tension:.4,borderWidth:2,pointRadius:0},{label:'Increased SIP',data:_scenRes.chart.map(x=>x.New),borderColor:'#0d9488',backgroundColor:'rgba(13,148,136,.1)',fill:true,tension:.4,borderWidth:2.5,pointRadius:0}]},options:cOpts()});
    },30);
  });
};

const reportsTab=()=>{

  const tEMI=S.liabilities.reduce((s,l)=>s+Number(l.emiAmount||0),0);
  const yrMonthsElapsed=fyMonths.filter(mo=>mo<=m).length;

const bindSettings=()=>{
  document.getElementById('s-mod-save')?.addEventListener('click',()=>{

  });

  });

    D('SETTINGS',{userName:S.userName,openingCash:Number(document.getElementById('s-cash').value)||0,openingInvestments:Number(document.getElementById('s-inv').value)||0});
  });
  document.getElementById('s-backup')?.addEventListener('click',()=>{

    pushNotif('Backup exported — import this file on any browser ✓');
  });
  document.getElementById('s-backup2')?.addEventListener('click',()=>{
    exportJSON(S,`ArthYatra_backup_${S.auth.email.replace('@','_at_')}_${todayStr()}`);
    pushNotif('Backup exported — open this file on another device ✓');
  });
  document.getElementById('s-import-file')?.addEventListener('change',e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.auth||!data.incomes){pushNotif('Invalid backup file','red');return}
        if(confirm('Import this backup? All current data will be replaced.')){
          const uk=S.userKey;
          Object.assign(S,data,{userKey:uk,sipFunds:data.sipFunds||[],budgets:data.budgets||[],calendarEvents:data.calendarEvents||[],moduleSettings:{...DEFAULT_MODULE_SETTINGS,...(data.moduleSettings||{})}});
          saveS();pushNotif('Backup imported ✓');render();
        }
      }catch(ex){pushNotif('Could not read backup file','red');}
    };
    reader.readAsText(file);
  });
  document.getElementById('s-logout')?.addEventListener('click',()=>D('LOGOUT'));
  document.getElementById('s-reset')?.addEventListener('click',()=>D('RESET'));
};

        </select>
      </div>
      <div class="form-group"><label class="label">Monthly Budget (₹)</label><input class="input" id="b-amt" type="number" placeholder="e.g. 15,000" value="${be?be.amount:''}"/></div>
      <div class="form-group"><label class="label">Alert Threshold (%)</label>
        <select class="select" id="b-threshold">
          ${[70,80,90,100].map(v=>`<option value="${v}"${be&&be.threshold===v?' selected':v===80?' selected':''}>Alert at ${v}%</option>`).join('')}
        </select>
      </div>
      <div class="btn-group">
        <button class="btn-primary" id="b-save">${be?'Update Budget':'Add Budget Limit'}</button>
        ${be?`<button class="btn-secondary" id="b-cancel">Cancel</button>`:''}
      </div>
    </div>
  </div>

  <!-- Budget list -->
  <div class="list-wrap">
    <div class="section-label mb">Budget Limits — ${now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</div>
    ${S.budgets.length===0?`<div class="empty"><div class="empty-icon">💼</div><div class="empty-text">No budgets set yet</div><div class="empty-sub">Add category limits above</div></div>`:
    S.budgets.map(b=>{
      const spent=spendMap[b.category]||0;
      const pctUsed=b.amount>0?Math.min(100,Math.round(spent/b.amount*100)):0;
      const barColor=spent>b.amount?'var(--red)':pctUsed>=80?'var(--amber)':'var(--teal)';
      return`<div class="card" style="margin-bottom:.5rem;padding:.875rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem">
          <div>
            <div style="font-weight:700;font-size:.9rem;color:var(--text)">${b.category}</div>
            <div style="font-size:.72rem;color:var(--text-3);margin-top:.1rem">Budget: ${fmt(b.amount)}/mo · Alert at ${b.threshold||80}%</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:800;font-size:.95rem;color:${barColor}">${fmt(spent)}</div>
            <div style="font-size:.68rem;color:var(--text-4)">${pctUsed}% used</div>
          </div>
        </div>
        <div style="height:6px;background:var(--border);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${pctUsed}%;background:${barColor};border-radius:99px;transition:width .3s"></div>
        </div>
        <div style="display:flex;gap:.35rem;margin-top:.625rem">
          <button class="btn-sm btn-edit" onclick="_budgetEdit='${b.id}';render()">Edit</button>
          <button class="btn-sm btn-del" onclick="D('DEL_BUDGET','${b.id}')">Delete</button>
        </div>
      </div>`;
    }).join('')}
  </div>

  <!-- Overall summary -->
  <div class="card-wrap" style="margin-top:.5rem">
    <div class="card">
      <div class="section-label mb">Monthly Summary — ${now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
        <div class="calc-box"><div class="calc-box-val amber">${fmt(S.budgets.reduce((s,b)=>s+Number(b.amount),0))}</div><div class="calc-box-label">Total Budget</div></div>
        <div class="calc-box"><div class="calc-box-val ${Object.values(spendMap).reduce((a,b)=>a+b,0)>S.budgets.reduce((s,b)=>s+Number(b.amount),0)?'red':'teal'}">${fmt(Object.values(spendMap).reduce((a,b)=>a+b,0))}</div><div class="calc-box-label">Total Spent</div></div>
      </div>
    </div>
  </div>`;
};

const bindBudget=()=>{
  document.getElementById('b-cancel')?.addEventListener('click',()=>{_budgetEdit=null;render()});
  document.getElementById('b-save')?.addEventListener('click',()=>{
    const category=document.getElementById('b-cat').value;
    const amount=Number(document.getElementById('b-amt').value);
    const threshold=Number(document.getElementById('b-threshold').value)||80;
    if(!amount){pushNotif('Enter a budget amount','red');return}
    const existing=S.budgets.find(b=>b.category===category&&b.id!==(_budgetEdit||''));
    if(existing&&!_budgetEdit){pushNotif(`Budget for ${category} already exists — edit it instead`,'amber');return}
    const entry={id:_budgetEdit||genId(),category,amount,threshold};
    if(_budgetEdit){D('UPD_BUDGET',entry);_budgetEdit=null;pushNotif('Budget updated')}
    else{D('ADD_BUDGET',entry);pushNotif('Budget limit set')}
  });
};

// Check budget alerts and push notifications
const checkBudgetAlerts=()=>{
  const m=thisMonth();
  const spendMap={};
  S.expenses.filter(e=>e.month===m).forEach(e=>{spendMap[e.category]=(spendMap[e.category]||0)+Number(e.amount)});
  S.budgets.forEach(b=>{
    const spent=spendMap[b.category]||0;
    const pct=b.amount>0?Math.round(spent/b.amount*100):0;
    const threshold=b.threshold||80;
    if(spent>b.amount){
      const key=`budget_over_${b.id}_${m}`;
      if(!localStorage.getItem(key)){localStorage.setItem(key,'1');pushNotif(`🚨 Budget exceeded: ${b.category} — spent ${fmt(spent)} vs limit ${fmt(b.amount)}`,'red')}
    } else if(pct>=threshold){
      const key=`budget_near_${b.id}_${m}_${threshold}`;
      if(!localStorage.getItem(key)){localStorage.setItem(key,'1');pushNotif(`🔔 Budget alert: ${b.category} at ${pct}% — ${fmt(spent)} of ${fmt(b.amount)}`,'amber')}
    }
  });
};

// ─── CALENDAR MODULE ───
let _calView='month',_calEdit=null;
const CAL_TYPES=['Income','Expense','Loan EMI','Investment','Other'];
const CAL_COLORS={Income:'var(--green)',Expense:'var(--red)','Loan EMI':'var(--amber)',Investment:'var(--blue)',Other:'var(--teal)'};
const CAL_PILL_COLORS={Income:'pill-green',Expense:'pill-red','Loan EMI':'pill-amber',Investment:'pill-blue',Other:'pill-teal'};

const calendarTab=()=>{
  const now=new Date();
  const m=thisMonth();
  const ce=_calEdit?S.calendarEvents.find(e=>e.id===_calEdit):null;

  // Auto-generate events from existing data for current month
  const autoEvents=[];
  S.incomes.filter(i=>i.month===m&&i.isRecurring).forEach(i=>{
    autoEvents.push({id:'auto_inc_'+i.id,type:'Income',title:i.source,amount:i.amount,date:i.month+'-01',auto:true,note:'Recurring income'});
  });
  S.expenses.filter(e=>e.month===m&&e.isRecurring).forEach(e=>{
    autoEvents.push({id:'auto_exp_'+e.id,type:'Expense',title:e.category,amount:e.amount,date:e.date||e.month+'-01',auto:true,note:'Recurring expense'});
  });
  S.liabilities.filter(l=>l.emiAmount>0&&loanActiveInMonth(l,m)).forEach(l=>{
    const day=l.dueDay||1;
    const dateStr=`${m}-${String(day).padStart(2,'0')}`;
    autoEvents.push({id:'auto_emi_'+l.id,type:'Loan EMI',title:l.name+' EMI',amount:l.emiAmount,date:dateStr,auto:true,note:'Loan EMI'});
  });
  S.sipFunds.filter(f=>f.startDate&&f.startDate.slice(0,7)<=m).forEach(f=>{
    autoEvents.push({id:'auto_sip_'+f.id,type:'Investment',title:f.name+' SIP',amount:f.sipAmount,date:m+'-01',auto:true,note:'Monthly SIP'});
  });

  const allEvents=[...autoEvents,...S.calendarEvents].sort((a,b)=>a.date.localeCompare(b.date));
  const thisMonthEvents=allEvents.filter(e=>e.date&&e.date.startsWith(m));

  // Build calendar grid
  const year=Number(m.split('-')[0]);
  const month=Number(m.split('-')[1])-1;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=now.getDate();

  const eventsByDay={};
  thisMonthEvents.forEach(e=>{
    const d=Number((e.date||'').split('-')[2]);
    if(!eventsByDay[d])eventsByDay[d]=[];
    eventsByDay[d].push(e);
  });

  return`
  <div class="section-head"><div class="section-title">Event Calendar</div><div class="section-sub">${now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})} — income, expenses, loans & investments</div></div>

  <!-- Calendar Grid -->
  <div class="card-wrap">
    <div class="card" style="padding:.75rem">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;margin-bottom:.5rem">
        ${['S','M','T','W','T','F','S'].map(d=>`<div style="font-size:.65rem;font-weight:700;color:var(--text-4);padding:.25rem 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
        ${Array(firstDay).fill('').map(()=>`<div></div>`).join('')}
        ${Array.from({length:daysInMonth},(_,i)=>{
          const day=i+1;
          const evts=eventsByDay[day]||[];
          const isToday=day===today;
          const hasIncome=evts.some(e=>e.type==='Income');
          const hasExpense=evts.some(e=>e.type==='Expense');
          const hasEMI=evts.some(e=>e.type==='Loan EMI');
          const hasInv=evts.some(e=>e.type==='Investment');
          const dots=[hasIncome?'var(--green)':null,hasExpense?'var(--red)':null,hasEMI?'var(--amber)':null,hasInv?'var(--blue)':null].filter(Boolean);
          return`<div style="border-radius:6px;padding:.3rem .15rem;text-align:center;cursor:${evts.length?'pointer':'default'};background:${isToday?'var(--teal)':'transparent'};border:1px solid ${evts.length?'var(--teal-border)':'transparent'}" onclick="if(${evts.length})document.getElementById('cal-day-${day}').scrollIntoView({behavior:'smooth'})">
            <div style="font-size:.78rem;font-weight:${isToday?'800':'500'};color:${isToday?'#fff':'var(--text-2)'};line-height:1.2">${day}</div>
            <div style="display:flex;justify-content:center;gap:1.5px;margin-top:1px">
              ${dots.slice(0,3).map(c=>`<div style="width:4px;height:4px;border-radius:50%;background:${isToday?'rgba(255,255,255,.8)':c}"></div>`).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.625rem;padding-top:.5rem;border-top:1px solid var(--border)">
        ${[['Income','var(--green)'],['Expense','var(--red)'],['Loan EMI','var(--amber)'],['Investment','var(--blue)']].map(([l,c])=>`<div style="display:flex;align-items:center;gap:.3rem;font-size:.68rem;color:var(--text-3)"><div style="width:7px;height:7px;border-radius:50%;background:${c}"></div>${l}</div>`).join('')}
      </div>
    </div>
  </div>

  <!-- Event list this month -->
  <div class="list-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.625rem">
      <div class="section-label" style="margin-bottom:0">Events — ${now.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</div>
      <button onclick="document.getElementById('cal-add-wrap').style.display=document.getElementById('cal-add-wrap').style.display==='none'?'block':'none'" style="font-size:.75rem;font-weight:700;padding:.35rem .75rem;background:var(--teal-light);border:1px solid var(--teal-border);border-radius:6px;color:var(--teal);cursor:pointer;font-family:var(--font)">+ Add Event</button>
    </div>
    <!-- Add event form (hidden by default) -->
    <div id="cal-add-wrap" style="display:${ce?'block':'none'}">
      <div class="card" style="margin-bottom:.75rem;padding:.875rem">
        <div class="section-label mb">${ce?'Edit Event':'New Event'}</div>
        <div class="form-group"><label class="label">Title *</label><input class="input" id="cal-title" placeholder="e.g. Salary credit" value="${ce?ce.title:''}"/></div>
        <div class="form-group"><label class="label">Type</label><select class="select" id="cal-type">${CAL_TYPES.map(t=>`<option${ce&&ce.type===t?' selected':''}>${t}</option>`).join('')}</select></div>
        <div class="form-group"><label class="label">Amount (₹)</label><input class="input" id="cal-amt" type="number" placeholder="Optional" value="${ce?ce.amount||'':''}"/></div>
        <div class="form-group"><label class="label">Date *</label><input class="input" id="cal-date" type="date" value="${ce?ce.date:todayStr()}"/></div>
        <label class="checkbox-row"><input type="checkbox" id="cal-recur" ${ce&&ce.recurring?'checked':''}/> Recurring monthly</label>
        <div class="form-group"><label class="label">Note</label><input class="input" id="cal-note" placeholder="Optional" value="${ce?ce.note||'':''}"/></div>
        <div class="btn-group">
          <button class="btn-primary" id="cal-save">${ce?'Update Event':'Add Event'}</button>
          <button class="btn-secondary" onclick="document.getElementById('cal-add-wrap').style.display='none';_calEdit=null;render()">Cancel</button>
        </div>
      </div>
    </div>

    ${thisMonthEvents.length===0?`<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">No events this month</div><div class="empty-sub">Events auto-populate from your income, expense, and loan data. You can also add custom events.</div></div>`:
    thisMonthEvents.map(e=>{
      const day=Number((e.date||'').split('-')[2]);
      return`<div class="list-item" id="cal-day-${day}">
        <div>
          <div style="font-size:.7rem;font-weight:700;color:var(--text-4);margin-bottom:.2rem">${e.date}</div>
          <div class="item-title">${e.title}</div>
          <div style="margin-top:.3rem"><span class="pill ${CAL_PILL_COLORS[e.type]||'pill-teal'}">${e.type}</span>${e.auto?`<span style="font-size:.65rem;color:var(--text-4);margin-left:.4rem">auto</span>`:''}${e.recurring?`<span style="font-size:.65rem;color:var(--teal);margin-left:.4rem">🔄 recurring</span>`:''}</div>
          ${e.note?`<div style="font-size:.72rem;color:var(--text-3);margin-top:.2rem">${e.note}</div>`:''}
        </div>
        <div style="text-align:right">
          ${e.amount?`<div class="item-amount" style="color:${CAL_COLORS[e.type]||'var(--teal)'}">${fmt(e.amount)}</div>`:''}
          ${!e.auto?`<div class="item-actions">
            <button class="btn-sm btn-edit" onclick="_calEdit='${e.id}';document.getElementById('cal-add-wrap').style.display='block';render()">Edit</button>
            <button class="btn-sm btn-del" onclick="D('DEL_CAL','${e.id}')">Delete</button>
          </div>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>

  <!-- Upcoming reminders -->
  <div class="card-wrap" style="margin-top:.5rem">
    <div class="card">
      <div class="section-label mb">Upcoming in Next 7 Days</div>
      ${(()=>{
        const today2=now.toISOString().split('T')[0];
        const next7=new Date(now.getTime()+7*24*3600000).toISOString().split('T')[0];
        const upcoming=[...autoEvents,...S.calendarEvents].filter(e=>e.date>=today2&&e.date<=next7).sort((a,b)=>a.date.localeCompare(b.date));
        return upcoming.length===0?`<div style="font-size:.8rem;color:var(--text-4);text-align:center;padding:.5rem">No events in the next 7 days</div>`:
        upcoming.map(e=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-size:.82rem;font-weight:700;color:var(--text)">${e.title}</div>
            <div style="font-size:.68rem;color:var(--text-4)">${e.date} · <span class="pill ${CAL_PILL_COLORS[e.type]||'pill-teal'}" style="padding:.1rem .4rem">${e.type}</span></div>
          </div>
          ${e.amount?`<div style="font-weight:800;font-size:.88rem;color:${CAL_COLORS[e.type]||'var(--teal)'}">${fmt(e.amount)}</div>`:''}
        </div>`).join('');
      })()}
    </div>
  </div>`;
};

const bindCalendar=()=>{
  document.getElementById('cal-save')?.addEventListener('click',()=>{
    const title=document.getElementById('cal-title').value.trim();
    const type=document.getElementById('cal-type').value;
    const amount=Number(document.getElementById('cal-amt').value)||0;
    const date=document.getElementById('cal-date').value;
    const recurring=document.getElementById('cal-recur').checked;
    const note=document.getElementById('cal-note').value;
    if(!title||!date){pushNotif('Please enter title and date','red');return}
    const entry={id:_calEdit||genId(),title,type,amount,date,recurring,note};
    if(_calEdit){D('UPD_CAL',entry);_calEdit=null;pushNotif('Event updated')}
    else{D('ADD_CAL',entry);pushNotif('Event added')}
    document.getElementById('cal-add-wrap').style.display='none';
  });
};
// Persist session so user stays logged in after refresh
const SESSION_KEY='wo_session';
const saveSession=()=>{if(S.userKey&&S.auth.loggedIn)localStorage.setItem(SESSION_KEY,JSON.stringify({uk:S.userKey,email:S.auth.email}))};
const clearSession=()=>localStorage.removeItem(SESSION_KEY);
const restoreSession=()=>{try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null')}catch{return null}};

// Strip query params / UTM tags added by WhatsApp, Telegram, etc.
(()=>{
  try{
    if(location.search){history.replaceState(null,'',location.pathname+location.hash)}
    // Prevent weird redirects in in-app browsers by explicitly setting base
    if(document.baseURI&&document.baseURI.includes('blob:')){
      // Running from blob: URL — data-only mode, no URL manipulation
    }
  }catch(e){}
})();

window.addEventListener('hashchange',()=>{const uk=getUserKey();if(uk&&uk!==S.userKey){loadS(uk)}destroyCharts();render()});
window.addEventListener('pageshow',(e)=>{if(e.persisted){// Back-forward cache restore on mobile
  const sess=restoreSession();if(sess){const uk=sess.uk;if(uk){if(!getUserKey())setUserKey(uk);loadS(uk);S.auth={email:sess.email,loggedIn:true};}}render();}});
(()=>{
  // Try to restore session first
  const sess=restoreSession();
  const uk=getUserKey()||(sess?.uk)||null;
  if(uk){
    if(!getUserKey())setUserKey(uk);
    loadS(uk);
    if(sess&&sess.uk===uk&&S.onboarded){
      S.auth={email:sess.email,loggedIn:true};
    }
  }
  render();
})();
</script>
